components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: rani-session
  parameters:
    ClientIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    ClientsListResponse:
      type: object
      properties:
        clients:
          type: array
          items:
            $ref: "#/components/schemas/ClientSummary"
        total:
          type: integer
      required: [clients, total]
    ClientSummary:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
      required: [id, name]
    ClientProfileResponse:
      allOf:
        - $ref: "#/components/schemas/ClientSummary"
        - type: object
          properties:
            phone:
              type: string
            ltv:
              type: number
            visitCount:
              type: integer
            appointments:
              type: array
              items:
                type: object
                additionalProperties: true
            transactions:
              type: array
              items:
                type: object
                additionalProperties: true
            memberships:
              type: array
              items:
                type: object
                additionalProperties: true
    ChurnPredictionResponse:
      type: object
      properties:
        clientId:
          type: string
        clientName:
          type: string
        score:
          type: number
        risk:
          type: string
        recommendation:
          type: string
      required: [clientId, score, risk]
    RecommendationResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            type: object
            additionalProperties: true
        strategies:
          type: array
          items:
            type: string
      required: [recommendations]
    ScheduleResponse:
      type: object
      properties:
        today:
          type: array
          items:
            type: object
            additionalProperties: true
        utilization:
          type: object
          additionalProperties: true
        stats:
          type: object
          additionalProperties: true
      required: [today, utilization, stats]
    NoShowRiskItem:
      type: object
      properties:
        appointmentId:
          type: string
        clientName:
          type: string
        service:
          type: string
        provider:
          type: string
        date:
          type: string
        time:
          type: string
        noShowScore:
          type: object
          properties:
            score:
              type: number
            risk:
              type: string
          required: [score]
      required: [appointmentId, clientName, noShowScore]
    PlaidTransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
        page:
          type: integer
        hasMore:
          type: boolean
      required: [transactions, total, page, hasMore]
    TrainingResponse:
      type: object
      properties:
        modules:
          type: array
          items:
            type: object
            additionalProperties: true
        byRole:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: true
        stats:
          type: object
          additionalProperties: true
        roleLabels:
          type: object
          additionalProperties:
            type: string
        roleColors:
          type: object
          additionalProperties:
            type: string
      required: [modules, byRole, stats]
    LoyaltyAwardBonusRequest:
      type: object
      properties:
        action:
          type: string
          enum: [award_bonus]
        clientId:
          type: string
        bonusType:
          type: string
          enum: [birthday, review, referral, visit_streak, tier_up]
      required: [action, clientId, bonusType]
    LoyaltyProcessSpendRequest:
      type: object
      properties:
        action:
          type: string
          enum: [process_spend]
        clientId:
          type: string
        amount:
          type: number
        serviceType:
          type: string
      required: [action, clientId, amount, serviceType]
    PatientMagicLinkRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    PatientVerifyRequest:
      type: object
      properties:
        token:
          type: string
        email:
          type: string
          format: email
      required: [token, email]

    # ── Wave 4 named schemas ──────────────────────────────────────────

    ProvidersSummaryResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              appointmentCount:
                type: integer
              revenue:
                type: number
              avgTicket:
                type: number
              utilizationRate:
                type: number
        total:
          type: integer

    ProviderDetailResponse:
      type: object
      properties:
        name:
          type: string
        revenue:
          type: number
        appointmentCount:
          type: integer
        avgTicket:
          type: number
        topServices:
          type: array
          items:
            type: object
        monthlyMetrics:
          type: array
          items:
            type: object

    RevenueResponse:
      type: object
      properties:
        total:
          type: number
        byProvider:
          type: array
          items:
            type: object
        byService:
          type: array
          items:
            type: object
        byCategory:
          type: array
          items:
            type: object

    RevenueTrendsResponse:
      type: object
      properties:
