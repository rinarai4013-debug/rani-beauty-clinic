# Critical CI Gate
#
# This is a SCOPED CI pipeline that checks only the clinic-critical
# surface — not the full codebase. Full TypeScript, ESLint, and test
# checks are intentionally excluded because:
#
# 1. next.config.mjs has ignoreBuildErrors: true (masks all TS errors)
# 2. Local node_modules was corrupted by 1,291 Finder-duplicate dirs
# 3. Full tsc hangs due to the Next.js TypeScript plugin + next dev
# 4. ESLint and Vitest have not been verified against current codebase
#
# When full tooling is recovered, add these as required checks:
#   - npm run typecheck (full tsc --noEmit)
#   - npm run lint
#   - npm run test
#   - npm run build

name: Critical CI

on:
  pull_request:
    branches: [main, 'codex/**']
  push:
    branches: [main, 'codex/**']

jobs:
  critical-checks:
    name: Scoped critical checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Scoped TypeScript check: only clinic-critical routes and auth libs
      # Uses tsconfig.critical.json which targets ~35 entry files
      - name: TypeScript (critical routes)
        run: npx tsc --project tsconfig.critical.json --noEmit

      # Syntax-check automation scripts
      - name: Validate route-readiness script
        run: node --check scripts/route-readiness.mjs

      - name: Validate smoke-preview script
        run: node --check scripts/smoke-preview.mjs

      # Generate route readiness report (non-blocking, for PR review)
      - name: Route readiness report
        run: node scripts/route-readiness.mjs
