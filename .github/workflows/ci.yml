name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit --skipLibCheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test
          AIRTABLE_PAT: test_pat_fake
          AIRTABLE_BASE_ID: appTEST123
          DASHBOARD_JWT_SECRET: test-jwt-secret-for-ci-only
          ANTHROPIC_API_KEY: test-key
          RESEND_API_KEY: test-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run -s openapi:lint
