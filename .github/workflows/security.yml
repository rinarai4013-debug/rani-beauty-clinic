name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 6AM UTC
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          set +e
          npm audit --audit-level=high --json > audit-results.json 2>&1
          AUDIT_EXIT=$?
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

          # Parse summary
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-results.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-results.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-results.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-results.json)
          TOTAL=$(jq '.metadata.vulnerabilities.total // 0' audit-results.json)

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"
          echo "low=$LOW" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run vulnerability scan with better-npm-audit
        id: vuln_scan
        run: |
          npx better-npm-audit audit --level high || true

      - name: Post security findings as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const critical = parseInt('${{ steps.audit.outputs.critical }}') || 0;
            const high = parseInt('${{ steps.audit.outputs.high }}') || 0;
            const moderate = parseInt('${{ steps.audit.outputs.moderate }}') || 0;
            const low = parseInt('${{ steps.audit.outputs.low }}') || 0;
            const total = parseInt('${{ steps.audit.outputs.total }}') || 0;

            const statusIcon = (critical > 0 || high > 0) ? '🔴' : moderate > 0 ? '🟡' : '🟢';

            let comment = `## ${statusIcon} Security Audit Results\n\n`;
            comment += '| Severity | Count |\n|----------|-------|\n';
            comment += `| Critical | ${critical} |\n`;
            comment += `| High | ${high} |\n`;
            comment += `| Moderate | ${moderate} |\n`;
            comment += `| Low | ${low} |\n`;
            comment += `| **Total** | **${total}** |\n\n`;

            if (critical > 0 || high > 0) {
              comment += '> **Action Required:** High or critical vulnerabilities found. Run `npm audit fix` or review advisory details.\n';
            } else if (total === 0) {
              comment += '> No known vulnerabilities found.\n';
            } else {
              comment += '> Only low/moderate severity issues found. Review at your convenience.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });

      - name: Fail on high/critical vulnerabilities
        if: steps.audit.outputs.has_issues == 'true'
        run: |
          echo "::error::Found high or critical vulnerabilities"
          echo "Critical: ${{ steps.audit.outputs.critical }}"
          echo "High: ${{ steps.audit.outputs.high }}"
          exit 1
